plugins {
    id 'java-library'
}

group = 'dev.eidos'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withJavadocJar()
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.test {
    useJUnitPlatform()
}

jar {
    exclude('dev/eidos/vm/debug/**')
    archiveBaseName.set('vm')
    archiveVersion.set(version)
}